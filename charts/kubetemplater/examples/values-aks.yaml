# Example values for Azure Kubernetes Service (AKS) deployment
# 
# This file demonstrates recommended configuration for AKS clusters
# with cert-manager for automatic certificate management.
#
# Usage:
#   helm install kubetemplater ./charts/kubetemplater \
#     --namespace kubetemplater-system \
#     --create-namespace \
#     -f examples/values-aks.yaml

replicaCount: 2  # High availability in production

image:
  repository: <your-acr-registry>.azurecr.io/kubetemplater
  pullPolicy: IfNotPresent
  tag: "0.2.0"

# Enable pod disruption budget for HA
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8443"

serviceAccount:
  create: true
  annotations:
    # Azure Workload Identity (if using)
    # azure.workload.identity/client-id: "<your-client-id>"
  name: "kubetemplater"

# Webhook configuration with AKS native certificate management
webhook:
  enabled: true
  
  # Use cloud-native certificate management (recommended for AKS)
  # AKS automatically generates and injects certificates - no cert-manager needed!
  certificateMode: "cloud-native"
  
  # Alternative: Use cert-manager
  # First install cert-manager, then set:
  # certificateMode: "cert-manager"
  # certManager:
  #   issuerName: ""         # Empty = self-signed
  #   issuerKind: "Issuer"
  
  service:
    port: 443
    targetPort: 9443
  
  # Fail requests if webhook is unavailable (recommended for security)
  failurePolicy: Fail
  
  # Webhook timeout
  timeoutSeconds: 10

# Resource limits optimized for production AKS
resources:
  limits:
    cpu: 1000m
    memory: 256Mi
  requests:
    cpu: 100m
    memory: 128Mi

# Node selector for system node pool (if using)
# nodeSelector:
#   agentpool: system

# Tolerations for system taints
# tolerations:
# - key: CriticalAddonsOnly
#   operator: Exists

# Affinity for high availability
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchExpressions:
          - key: app.kubernetes.io/name
            operator: In
            values:
            - kubetemplater
        topologyKey: kubernetes.io/hostname
