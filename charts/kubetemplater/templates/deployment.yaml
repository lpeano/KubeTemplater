apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kubetemplater.fullname" . }}
  labels:
    {{- include "kubetemplater.labels" . | nindent 4 }}
  namespace: {{.Release.Namespace}}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kubetemplater.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kubetemplater.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        command:
        - /manager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: 9443
          name: webhook-server
          protocol: TCP
        - containerPort: 8443
          name: metrics
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        {{- if and .Values.webhook.enabled (ne .Values.webhook.certificateMode "cloud-native") }}
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: cert
          readOnly: true
        {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: {{ include "kubetemplater.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      volumes:
      {{- if and .Values.webhook.enabled (ne .Values.webhook.certificateMode "cloud-native") }}
      - name: cert
        secret:
          defaultMode: 420
          {{- if eq .Values.webhook.certificateMode "cert-manager" }}
          secretName: {{ include "kubetemplater.fullname" . }}-webhook-server-cert
          {{- else if eq .Values.webhook.certificateMode "manual" }}
          secretName: {{ include "kubetemplater.fullname" . }}-webhook-manual-cert
          {{- end }}
      {{- end }}
